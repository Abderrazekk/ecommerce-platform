version: "3.8"

services:
  mongodb:
    image: mongo:6
    container_name: ecommerce-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=
      - MONGO_INITDB_ROOT_PASSWORD=
      - MONGO_INITDB_DATABASE=ecommerce
    volumes:
      - mongo-data:/data/db
    networks:
      - ecommerce-network

  backend:
    build: ./ecommerce-backend
    container_name: ecommerce-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    env_file:
      - ./ecommerce-backend/.env
    environment:
      - MONGO_URI=mongodb://mongodb:27017/ecommerce
    depends_on:
      - mongodb
    networks:
      - ecommerce-network

  frontend:
    build:
      context: ./ecommerce-frontend
      args:
        - VITE_API_URL=/api # <-- important: relative URL so nginx can proxy
    container_name: ecommerce-frontend
    restart: unless-stopped
    ports:
      - "80:80" # change left port if 80 is taken, e.g. "3000:80"
    depends_on:
      - backend
    networks:
      - ecommerce-network

volumes:
  mongo-data:
    driver: local

networks:
  ecommerce-network:
    driver: bridge
